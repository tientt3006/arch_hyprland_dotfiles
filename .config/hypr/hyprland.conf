
########################################################################################
# HYPRLAND CONFIGURATION
########################################################################################

# --- Monitor ---
# monitor=display name, resolution and refresh frequence, coordination,scale
monitor=,preferred,auto,1
# monitor = eDP-1, 1920x900@60.21, 0x0, 1.0  
# monitor=HDMI-A-1,disable
source = ~/.config/hypr/monitors.conf
monitor = eDP-1, addreserved, 50, 30, 0, 0

# monitor=,1920x1080@75,auto,auto

# --- Startup (Chuẩn hóa UWSM) ---
source = ~/.config/hypr/wallust-colors.conf

exec-once = uwsm app -- awww-daemon --quiet
exec-once = uwsm app -- awww img "$HOME/GDrive_bisync/picture/Saved pics/arch_wallpapers/d_void.png"
exec-once = uwsm app -- easyeffects --gapplication-service
exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store
exec-once = ~/.config/hypr/scripts/float-daemon.sh

# --- Environment Variables ---
# env = XCURSOR_SIZE,24
# env = QT_QPA_PLATFORMTHEME,qt5ct
# env GVIM_ENABLE_WAYLAND=1

# env = XDG_CURRENT_DESKTOP,Hyprland
# env = XDG_SESSION_TYPE,wayland
# env = XDG_SESSION_DESKTOP,Hyprland

# --- NVIDIA ENV ---
# Comment out these lines if you don't use Nvidia
# env = LIBVA_DRIVER_NAME,nvidia 
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = NVD_BACKEND,direct

misc {
    # Tự động focus vào ứng dụng yêu cầu kích hoạt (ví dụ: click link mở Chrome)
    focus_on_activate = true
}

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        # natural_scroll: yes (cuộn ngược giống MacOS/Điện thoại), no (cuộn xuôi truyền thống Windows)
        natural_scroll = yes
        # scroll_factor: Tốc độ cuộn chuột. 1.0 là mặc định, 0.5 là chậm bằng một nửa
        scroll_factor = 0.3
        # tap-and-drag: Cho phép chạm đúp và giữ tay trên touchpad để kéo thả cửa sổ (true/false)
        tap-and-drag = false
    }
    # accel_profile: Quyết định cách chuột tăng tốc.
    # - flat: Không gia tốc, chuột di chuyển 1:1 với tay (Chuẩn nhất để chơi game).
    # - adaptive: Có gia tốc, di tay nhanh thì con trỏ bay nhanh và xa hơn (Chuẩn cho văn phòng).
    # - custom: Tự thiết lập theo đồ thị.
    accel_profile = flat
    # sensitivity: Độ nhạy của chuột, chạy từ -1.0 đến 1.0 (0 là mặc định gốc của chuột)
    sensitivity = 0
}



input {
    special_fallthrough = true
}

cursor {
    no_hardware_cursors = true
}

# --- General ---
general {
    gaps_in = 5
    gaps_out = 10, 10, 10, 10
    border_size = 0
    
    # Màu viền khi cửa sổ đang Focus (Màu Xanh Biển Catppuccin & Tím nhạt)
    col.active_border = $color1 $color2 45deg
    # Màu viền khi cửa sổ không dùng (Màu Xám Đen Catppuccin Crust)
    col.inactive_border = $background

    layout = dwindle
    allow_tearing = true # Fix input latency
}

# --- Decoration ---
decoration {
    rounding = 10
    active_opacity = 0.97
    inactive_opacity = 0.93

    blur {
        enabled = true
        size = 5
        passes = 2
        ignore_opacity = true
    }

    shadow {
        enabled = false
        range = 25
        render_power = 3
        color = rgba(11111be6)
    }
}

# --- Animations ---
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1
    animation = windows, 1, 3, myBezier
    animation = windowsOut, 1, 3, default, popin 80%
    animation = border, 1, 3, default
    animation = borderangle, 1, 3, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, default
}


# --- Layouts ---
dwindle {
    preserve_split = true
    force_split = 2
    smart_split = false
}

master {
    new_status = master
}

# --- Window Rules ---
layerrule {
	name = rofi-blur
	match:namespace = rofi
	blur = on
	ignore_alpha = 0.5
}
layerrule {
    name = waybar-blur
    match:namespace = waybar
    blur = on
    ignore_alpha = 0.5
}
layerrule {
    name = swaync-blur
    match:namespace = swaync-control-center
    blur = on
    ignore_alpha = 0.5
}
layerrule {
    name = swaync-notification-blur
    match:namespace = swaync-notification-window
    blur = on
    ignore_alpha = 0.5
}

windowrule {
    name = fzf_rule
    match:class = floating_fzf
    float = on
    center = on
    # Kích thước cửa sổ. Bạn có thể dùng pixel (vd: 1728 972) hoặc % của màn hình (vd: 90% 90% hoặc 80% 80%)
    size = 1400 800
    animation = popin
}

# --- Keybindings ---
$mainMod = SUPER


# Apps
bind = $mainMod, Return, exec, uwsm app -- kitty --single-instance
bind = $mainMod, E, exec, uwsm app -- thunar
bind = $mainMod, SPACE, exec, pkill rofi || uwsm app -- rofi -show drun -theme $HOME/.config/rofi/config.rasi
bind = $mainMod, Tab, exec, pkill rofi || uwsm app -- rofi -show window -theme $HOME/.config/rofi/config.rasi
bind = $mainMod, V, exec, pkill rofi || uwsm app -- $HOME/.config/rofi/clipboard.sh
bind = $mainMod SHIFT, F, exec, uwsm app -- kitty --name floating_fzf --class floating_fzf -e $HOME/.config/hypr/scripts/fzf-finder.sh
bind = $mainMod SHIFT, G, exec, uwsm app -- kitty --name floating_fzf --class floating_fzf -e $HOME/.config/hypr/scripts/live-grep.sh

# Wallpaper shortcuts
bind = $mainMod ALT, F, exec, uwsm app -- kitty --name floating_fzf --class floating_fzf -e $HOME/.config/hypr/scripts/fzf_wallpaper.sh
bind = $mainMod ALT, W, exec, $HOME/.config/hypr/scripts/random_wallpaper.sh
bind = $mainMod ALT, C, exec, $HOME/.config/hypr/scripts/apply_static_theme.sh

# Lệnh dưới đây là ngoại lệ KHÔNG CẦN uwsm 
# (Vì nó chỉ là lệnh trigger dbus siêu nhanh rồi tự hủy chứ không mở app)
bind = $mainMod, N, exec, swaync-client -t -sw

# System
bind = $mainMod, B, exec, pkill -SIGUSR1 waybar # Toggle Waybar (Ẩn/Hiện)
bind = $mainMod SHIFT, W, killactive, 
bind = $mainMod ALT, S, togglefloating,
bind = $mainMod, F, fullscreen, 
bind = ALT, F4, exec, pkill rofi || $HOME/.config/rofi/powermenu/powermenu.sh
# Dùng uwsm stop thay vì exit để thoát an toàn, tránh lỗi kẹt session gây chậm khi login lại
# bind = $mainMod CONTROL, Q, exec, ~/.config/hypr/scripts/sys_logout.sh
bind = $mainMod CONTROL, Q, exec, uwsm stop
bind = $mainMod, L, exec, loginctl lock-session
bind = $mainMod, S, exec, ~/.config/hypr/scripts/toggle-all-float.sh

# Layout
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, O, layoutmsg, togglesplit # dwindle

# Screenshots
bind = , Print, exec, grim - | tee "$HOME/OneDrive/Pictures/Screenshots/$(date +'%s_grim.png')" | wl-copy && notify-send "Screenshot" "Fullscreen captured"
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | tee "$HOME/OneDrive/Pictures/Screenshots/$(date +'%s_grim.png')" | wl-copy && notify-send "Screenshot" "Region captured"

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Move Window
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r

# Window Switching
bind = ALT, Tab, focuscurrentorlast,
bind = ALT, Tab, bringactivetotop,

# Switch Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move Window to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move all windows on current workspace to target workspace (Super+Alt+[1-0])
bind = $mainMod ALT, 1, exec, ~/.config/hypr/scripts/move_all_to_ws.sh 1
bind = $mainMod ALT, 2, exec, ~/.config/hypr/scripts/move_all_to_ws.sh 2
bind = $mainMod ALT, 3, exec, ~/.config/hypr/scripts/move_all_to_ws.sh 3
bind = $mainMod ALT, 4, exec, ~/.config/hypr/scripts/move_all_to_ws.sh 4
bind = $mainMod ALT, 5, exec, ~/.config/hypr/scripts/move_all_to_ws.sh 5
bind = $mainMod ALT, 6, exec, ~/.config/hypr/scripts/move_all_to_ws.sh 6
bind = $mainMod ALT, 7, exec, ~/.config/hypr/scripts/move_all_to_ws.sh 7
bind = $mainMod ALT, 8, exec, ~/.config/hypr/scripts/move_all_to_ws.sh 8
bind = $mainMod ALT, 9, exec, ~/.config/hypr/scripts/move_all_to_ws.sh 9
bind = $mainMod ALT, 0, exec, ~/.config/hypr/scripts/move_all_to_ws.sh 10

# Swap all windows between current workspace and target workspace (Super+Shift+Alt+[1-0])
bind = $mainMod SHIFT ALT, 1, exec, ~/.config/hypr/scripts/swap_ws.sh 1
bind = $mainMod SHIFT ALT, 2, exec, ~/.config/hypr/scripts/swap_ws.sh 2
bind = $mainMod SHIFT ALT, 3, exec, ~/.config/hypr/scripts/swap_ws.sh 3
bind = $mainMod SHIFT ALT, 4, exec, ~/.config/hypr/scripts/swap_ws.sh 4
bind = $mainMod SHIFT ALT, 5, exec, ~/.config/hypr/scripts/swap_ws.sh 5
bind = $mainMod SHIFT ALT, 6, exec, ~/.config/hypr/scripts/swap_ws.sh 6
bind = $mainMod SHIFT ALT, 7, exec, ~/.config/hypr/scripts/swap_ws.sh 7
bind = $mainMod SHIFT ALT, 8, exec, ~/.config/hypr/scripts/swap_ws.sh 8
bind = $mainMod SHIFT ALT, 9, exec, ~/.config/hypr/scripts/swap_ws.sh 9
bind = $mainMod SHIFT ALT, 0, exec, ~/.config/hypr/scripts/swap_ws.sh 10

# Close current workspace (Close all windows in it)
# bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/close_ws.sh

# Mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Zoom
bind = $mainMod SHIFT, mouse_up, exec, ~/.config/hypr/scripts/zoom.sh in
bind = $mainMod SHIFT, mouse_down, exec, ~/.config/hypr/scripts/zoom.sh out

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = $mainMod CTRL, U, exec, brightnessctl set +5%
bindel = $mainMod CTRL, D, exec, brightnessctl set 5%-

# Volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ --limit 1.5
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = $mainMod SHIFT, U, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ --limit 1.5
bindel = $mainMod SHIFT, D, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Gập màn hình -> Khóa máy và TẮT TÍN HIỆU màn hình (Cục PC bên trong vẫn chạy)
bindl = , switch:on:Lid Switch, exec, loginctl lock-session && hyprctl dispatch dpms off

# Mở màn hình -> Bật lại tín hiệu
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on

