<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Ưu tiên Nerd Font cho chế độ chữ đơn cách (Monospace) -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrainsMono Nerd Font</family>
      <family>Iosevka Nerd Font</family>
      <family>Noto Sans</family>
    </prefer>
  </alias>

  <!-- Sửa lỗi hiển thị biểu tượng bị phông CJK/Mincho chiếm quyền -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>JetBrainsMono Nerd Font</family>
    </prefer>
  </alias>
</fontconfig>
