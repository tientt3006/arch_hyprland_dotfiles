general {
    lock_cmd = pidof hyprlock || hyprlock       # Lệnh gọi màn hình khóa
    before_sleep_cmd = loginctl lock-session    # Đảm bảo máy tự khóa trước khi rơi vào trạng thái Suspend
    # after_sleep_cmd: không dùng dpms ở đây vì on-resume của listener dpms đã xử lý
    # Nếu dùng thêm sẽ bị double-toggle → màn đen. dispatch chỉ toggle, không set state.
}

# ==========================================
# 🔋 CẤU HÌNH KHI DÙNG PIN (BATTERY)
# ==========================================
# 1. Sau 180s , 3 phút: Giảm độ sáng màn hình
listener {
    timeout = 180
    on-timeout = ~/.config/hypr/scripts/smart-idle.sh bat dim
    on-resume = ~/.config/hypr/scripts/smart-idle.sh bat_resume dim
}

# 2. Sau 4 phút (240s): Tắt hẳn tín hiệu màn hình (Máy vẫn chạy)
listener {
    timeout = 240
    on-timeout = ~/.config/hypr/scripts/smart-idle.sh bat dpms_off
    on-resume = ~/.config/hypr/scripts/smart-idle.sh bat_resume dpms_on
}

# 3. Sau 5 phút (300s): Khóa màn hình
listener {
    timeout = 300
    on-timeout = ~/.config/hypr/scripts/smart-idle.sh bat lock
}

# 4. Sau 7 phút: Đưa máy vào trạng thái Suspend (Giống Sleep trên Windows)
listener {
    timeout = 420
    on-timeout = ~/.config/hypr/scripts/smart-idle.sh bat suspend
}

# ==========================================
# ⚡ CẤU HÌNH KHI CẮM SẠC (AC POWER)
# ==========================================

# 0. Sau 300s , 5 phút: Giảm độ sáng màn hình
listener {
    timeout = 300
    on-timeout = ~/.config/hypr/scripts/smart-idle.sh ac dim
    on-resume = ~/.config/hypr/scripts/smart-idle.sh ac_resume dim
}

# 1. Sau 6 phút (360s): Tắt màn hình
listener {
    timeout = 360
    on-timeout = ~/.config/hypr/scripts/smart-idle.sh ac dpms_off
    on-resume = ~/.config/hypr/scripts/smart-idle.sh ac_resume dpms_on
}

# 2. Sau 7 phút (420s): Khóa màn hình (Nhưng KHÔNG BAO GIỜ SLEEP)
listener {
    timeout = 420
    on-timeout = ~/.config/hypr/scripts/smart-idle.sh ac lock
}
